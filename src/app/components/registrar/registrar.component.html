<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-3">
      <i class="fas fa-clipboard-list text-blue-700"></i> Registrar Nueva Incidencia
    </h2>

    @if (mensaje) {
      <div class="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl p-4 flex items-center gap-2 text-sm">
        <i class="fas fa-check-circle"></i>
        <span>{{ mensaje }}</span>
      </div>
    }

    @if (error) {
      <div class="mb-4 bg-red-50 border border-red-200 text-red-800 rounded-xl p-4 flex items-center gap-2 text-sm">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ error }}</span>
      </div>
    }

    <form (submit)="registrarIncidencia()" class="space-y-5">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fas fa-barcode text-gray-400 mr-1"></i> Código de equipo *
          </label>
          <select [(ngModel)]="nuevaIncidencia.codigoEquipo" name="codigoEquipo" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 focus:border-blue-700 bg-gray-50 transition outline-none text-sm">
            @for (equipo of equipos; track equipo.id) {
              <option [value]="equipo.codigo">{{ equipo.codigo }}</option>
            }
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fas fa-user text-gray-400 mr-1"></i> Usuario responsable
          </label>
          <input type="text" readonly [value]="equipos.find(e => e.codigo === nuevaIncidencia.codigoEquipo)?.responsable?.nombre || ''"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-100 transition outline-none text-sm text-gray-500 cursor-not-allowed">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fas fa-headset text-gray-400 mr-1"></i> Canal de Registro *
          </label>
          <select [(ngModel)]="nuevaIncidencia.canalRegistro" name="canalRegistro" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 focus:border-blue-700 bg-gray-50 transition outline-none text-sm">
            <option value="TELEFONO">Teléfono</option>
            <option value="EMAIL">Email</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fas fa-user-pen text-gray-400 mr-1"></i> Registrado por *
          </label>
          <select [(ngModel)]="nuevaIncidencia.registradoPorId" name="registradoPorId" required
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 focus:border-blue-700 bg-gray-50 transition outline-none text-sm">
            @for (miembro of miembros; track miembro.id) {
              <option [value]="miembro.id">{{ miembro.nombre }} ({{ miembro.rol }})</option>
            }
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          <i class="fas fa-exclamation-triangle text-gray-400 mr-1"></i> Problema detectado *
        </label>
        <textarea [(ngModel)]="nuevaIncidencia.problema" name="problema" rows="3" placeholder="Describe el síntoma o falla encontrada..." required
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 focus:border-blue-700 bg-gray-50 transition outline-none text-sm"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          <i class="fas fa-notes-medical text-gray-400 mr-1"></i> Diagnóstico inicial
        </label>
        <textarea [(ngModel)]="nuevaIncidencia.diagnosticoInicial" name="diagnosticoInicial" rows="2" placeholder="Primeras observaciones del equipo técnico (opcional)..."
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-700 focus:border-blue-700 bg-gray-50 transition outline-none text-sm"></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="bg-blue-700 hover:bg-blue-800 text-white font-semibold px-6 py-3 rounded-full transition shadow-sm flex items-center gap-2">
          <i class="fas fa-save"></i> Guardar Incidencia
        </button>
        <button type="button" (click)="nuevaIncidencia.problema = ''; nuevaIncidencia.diagnosticoInicial = ''"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-3 rounded-full transition flex items-center gap-2">
          <i class="fas fa-undo"></i> Limpiar
        </button>
      </div>
    </form>
  </div>
</div>
