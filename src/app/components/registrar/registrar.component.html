<div class="form-container">
  <div class="card p-4 p-md-5 shadow-sm">
    <h2 class="h4 fw-bold text-dark mb-4 d-flex align-items-center gap-3">
      <i class="fas fa-clipboard-list text-primary-medium"></i> Registrar Nueva Incidencia
    </h2>

    @if (mensaje) {
      <div class="alert bg-success-light border-0 text-success-dark rounded-xl p-3 d-flex align-items-center gap-2 small mb-4" role="alert">
        <i class="fas fa-check-circle"></i>
        <span>{{ mensaje }}</span>
      </div>
    }

    @if (error) {
      <div class="alert bg-danger-light border-0 text-danger-dark rounded-xl p-3 d-flex align-items-center gap-2 small mb-4" role="alert">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ error }}</span>
      </div>
    }

    <form (submit)="registrarIncidencia()">
      <div class="row g-3 mb-3">
        <div class="col-12 col-sm-6">
          <label class="form-label">
            <i class="fas fa-barcode text-muted me-1"></i> Código de equipo *
          </label>
          <select [(ngModel)]="nuevaIncidencia.codigoEquipo" name="codigoEquipo" required class="form-select">
            @for (equipo of equipos; track equipo.id) {
              <option [value]="equipo.codigo">{{ equipo.codigo }}</option>
            }
          </select>
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">
            <i class="fas fa-user text-muted me-1"></i> Usuario responsable
          </label>
          <input type="text" readonly [value]="equipos.find(e => e.codigo === nuevaIncidencia.codigoEquipo)?.responsable?.nombre || ''" class="form-control">
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-12 col-sm-6">
          <label class="form-label">
            <i class="fas fa-headset text-muted me-1"></i> Canal de Registro *
          </label>
          <select [(ngModel)]="nuevaIncidencia.canalRegistro" name="canalRegistro" required class="form-select">
            <option value="TELEFONO">Teléfono</option>
            <option value="EMAIL">Email</option>
            <option value="WEB">Página Web</option>
          </select>
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">
            <i class="fas fa-user-pen text-muted me-1"></i> Registrado por *
          </label>
          <select [(ngModel)]="nuevaIncidencia.registradoPorId" name="registradoPorId" required class="form-select">
            @for (miembro of miembros; track miembro.id) {
              <option [value]="miembro.id">{{ miembro.nombre }} ({{ miembro.rol }})</option>
            }
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">
          <i class="fas fa-exclamation-triangle text-muted me-1"></i> Problema detectado *
        </label>
        <textarea [(ngModel)]="nuevaIncidencia.problema" name="problema" rows="3" placeholder="Describe el síntoma o falla encontrada..." required class="form-control"></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label">
          <i class="fas fa-notes-medical text-muted me-1"></i> Diagnóstico inicial
        </label>
        <textarea [(ngModel)]="nuevaIncidencia.diagnosticoInicial" name="diagnosticoInicial" rows="2" placeholder="Primeras observaciones del equipo técnico (opcional)..." class="form-control"></textarea>
      </div>

      <div class="d-flex gap-2 pt-2">
        <button type="submit" class="btn btn-primary d-flex align-items-center gap-2 shadow-sm">
          <i class="fas fa-save"></i> Guardar Incidencia
        </button>
        <button type="button" (click)="nuevaIncidencia.problema = ''; nuevaIncidencia.diagnosticoInicial = ''" class="btn btn-secondary d-flex align-items-center gap-2">
          <i class="fas fa-undo"></i> Limpiar
        </button>
      </div>
    </form>
  </div>
</div>
