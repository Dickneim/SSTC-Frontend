<div class="repuesto-container">
  <div class="card border-0 shadow-sm rounded-3xl overflow-hidden">
    <div class="header-panel">
      <h1 class="h3 fw-bold mb-1 d-flex align-items-center gap-3">
        <i class="fas fa-box-open"></i> Solicitar Repuesto
      </h1>
      <p class="small mb-0 opacity-90">Complete el formulario para la gestión logística de la incidencia activa.</p>
    </div>

    @if (error) {
      <div class="alert bg-danger-light border-0 text-danger-dark rounded-xl p-3 small m-4 mb-0 text-center" role="alert">
        {{ error }}
      </div>
    }

    <form (submit)="enviarSolicitud()" class="p-4 p-md-5">
      
      <!-- Datos de Referencia -->
      <div class="row g-3 bg-light p-4 rounded-2xl border mb-4">
        <div class="col-12 col-sm-6">
          <label class="small fw-bold text-muted text-uppercase mb-1 tracking-wider d-block">ID Incidencia</label>
          <span class="text-dark font-monospace fw-bold">INC-#{{ incidenciaId }}</span>
        </div>
        <div class="col-12 col-sm-6">
          <label class="small fw-bold text-muted text-uppercase mb-1 tracking-wider d-block">Equipo</label>
          <span class="text-dark fw-semibold">{{ incidencia?.equipo?.codigo }}</span>
        </div>
      </div>

      <!-- Selección de Repuesto -->
      <div class="row g-3 mb-3">
        <div class="col-12 col-sm-8">
          <label class="form-label">Repuesto Requerido *</label>
          <select [(ngModel)]="repuesto" name="repuesto" required class="form-select">
            <option value="">Seleccione un repuesto...</option>
            <option value="Memoria RAM DDR4 8GB">Memoria RAM DDR4 8GB</option>
            <option value="Unidad SSD 480GB">Unidad SSD 480GB</option>
            <option value="Fuente de Poder 600W">Fuente de Poder 600W</option>
            <option value="Teclado Laptop Corporativo">Teclado Laptop Corporativo</option>
          </select>
        </div>
        <div class="col-12 col-sm-4">
          <label class="form-label">Cantidad *</label>
          <input type="number" min="1" [(ngModel)]="cantidad" name="cantidad" required class="form-control">
        </div>
      </div>

      <!-- Justificación Técnica -->
      <div class="mb-4">
        <label class="form-label">Justificación Técnica</label>
        <textarea rows="4" [(ngModel)]="justificacion" name="justificacion" placeholder="Explique la necesidad del repuesto según el diagnóstico realizado..." class="form-control"></textarea>
      </div>

      <div class="d-flex flex-column flex-sm-row gap-2 pt-4 border-top">
        <button type="submit" class="btn btn-primary flex-grow-1 py-2.5 shadow-sm d-flex align-items-center justify-content-center gap-2">
          <i class="fas fa-paper-plane"></i> Enviar Solicitud
        </button>
        <button type="button" routerLink="/tareas" class="btn btn-secondary px-4 py-2.5">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
